name: Windows MSIX Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'    # e.g., v1.0.0

jobs:
  build-msix:
    runs-on: windows-latest

    permissions:
      contents: write 
      
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from secrets
        shell: pwsh
        run: |
          "API_BASE_URL=${{ secrets.API_BASE_URL }}" | Out-File -FilePath .env -Encoding utf8 -NoNewline

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Prepare signing cert
        shell: pwsh
        env:
          CERT_PFX_BASE64: ${{ secrets.CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:CERT_PASSWORD)) {
            Write-Error "CERT_PASSWORD secret is empty!"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path cert | Out-Null
          $bytes = [Convert]::FromBase64String($env:CERT_PFX_BASE64)
          [IO.File]::WriteAllBytes('cert/financeapp.pfx', $bytes)

          # Replace ${CERT_PASSWORD} placeholder in pubspec.yaml with actual password
          $pubspec = Get-Content pubspec.yaml -Raw
          $pubspec = $pubspec -replace '\$\{CERT_PASSWORD\}', $env:CERT_PASSWORD
          $pubspec | Set-Content pubspec.yaml -Encoding utf8
          Write-Host "✅ pubspec.yaml updated with cert password"

          # ✅ FIX: Import cert silently into store BEFORE msix runs
          # This prevents the interactive y/N prompt
          $sec = ConvertTo-SecureString $env:CERT_PASSWORD -AsPlainText -Force
          Import-PfxCertificate `
            -FilePath cert/financeapp.pfx `
            -CertStoreLocation Cert:\LocalMachine\TrustedPeople `
            -Password $sec `
            -Confirm:$false | Out-Null
          Import-PfxCertificate `
            -FilePath cert/financeapp.pfx `
            -CertStoreLocation Cert:\LocalMachine\Root `
            -Password $sec `
            -Confirm:$false | Out-Null
          Import-PfxCertificate `
            -FilePath cert/financeapp.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $sec `
            -Confirm:$false | Out-Null
          Write-Host "✅ Certificate imported to all stores silently"

      - name: Build MSIX
        shell: pwsh
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          dart pub global activate msix
          dart pub global run msix:create

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null

          # Copy MSIX
          $msix = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter "*.msix" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msix) {
            Write-Error "❌ No .msix file found!"
            exit 1
          }
          Copy-Item $msix.FullName "release/EliteFinance.msix"
          Write-Host "✅ Copied MSIX: $($msix.FullName)"

          # Generate .appinstaller file manually
          $appInstallerContent = @"
          <?xml version="1.0" encoding="utf-8"?>
          <AppInstaller
            Uri="https://github.com/graham005/Financial-Management-Frontend/releases/latest/download/EliteFinance.appinstaller"
            Version="1.0.0.0"
            xmlns="http://schemas.microsoft.com/appx/appinstaller/2018">
            <MainPackage
              Name="com.elitedestiny.finance"
              Publisher="CN=Elite Destiny Academy"
              Version="1.0.0.0"
              Uri="https://github.com/graham005/Financial-Management-Frontend/releases/latest/download/EliteFinance.msix"
              ProcessorArchitecture="x64" />
            <UpdateSettings>
              <OnLaunch
                HoursBetweenUpdateChecks="24"
                ShowPrompt="true"
                UpdateBlocksActivation="true" />
            </UpdateSettings>
          </AppInstaller>
          "@

          $appInstallerContent | Out-File -FilePath "release/EliteFinance.appinstaller" -Encoding utf8
          Write-Host "✅ Generated EliteFinance.appinstaller"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
