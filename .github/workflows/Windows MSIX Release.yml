name: Windows MSIX Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'    # e.g., v1.0.0

jobs:
  build-msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from secrets
        shell: pwsh
        run: |
          @"
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          "@ | Out-File -FilePath .env -Encoding utf8

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      # FIX: decode PFX and import using PowerShell
      - name: Prepare signing cert
        shell: pwsh
        env:
          CERT_PFX_BASE64: ${{ secrets.CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          # Verify password is not empty
          if ([string]::IsNullOrEmpty($env:CERT_PASSWORD)) {
            Write-Error "CERT_PASSWORD secret is empty!"
            exit 1
          }
          
          New-Item -ItemType Directory -Force -Path cert | Out-Null
          $bytes = [Convert]::FromBase64String($env:CERT_PFX_BASE64)
          [IO.File]::WriteAllBytes('cert/financeapp.pfx', $bytes)
          
          # Test password by trying to load the certificate
          try {
            $sec = ConvertTo-SecureString $env:CERT_PASSWORD -AsPlainText -Force
            $testCert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2('cert/financeapp.pfx', $sec)
            Write-Host "✅ Certificate loaded successfully. Subject: $($testCert.Subject)"
            
            # Import to store
            Import-PfxCertificate -FilePath cert/financeapp.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $sec | Out-Null
            
            # Export password to GitHub env
            "CERT_PASSWORD=$($env:CERT_PASSWORD)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } catch {
            Write-Error "❌ Certificate password is incorrect: $_"
            exit 1
          }

      - name: Build MSIX + App Installer
        run: |
          dart pub global activate msix
          dart pub global run msix:create

      - name: Prepare release assets (fixed names)
        shell: bash
        run: |
          mkdir -p release
          msix_path=$(ls -1 build/**/*.msix | head -n 1)
          appinstaller_path=$(ls -1 build/**/*.appinstaller | head -n 1)
          cp "$msix_path" "release/EliteFinance.msix"
          cp "$appinstaller_path" "release/EliteFinance.appinstaller"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
